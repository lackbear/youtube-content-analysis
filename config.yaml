# ── YouTube Collector Configuration ──────────────────────────────────────────

# API
api:
  key_env_var: YOUTUBE_API_KEY      # env variable name holding your API key
  max_retries: 3                    # retry attempts per failed call
  batch_size: 50                    # max video IDs per videos.list call

# Collection behaviour
collection:
  max_videos_per_channel: 30        # latest videos to pull per channel (chapter 6 commit 3.5:
                                    # bumped 10 → 30 to widen the bronze window enough that
                                    # high-frequency creators don't churn out of the latest-N
                                    # within a 7-day ASOF JOIN window. Quota cost: ceil(30 ×
                                    # N_channels / 50) units per run — at N=11 that's 7 units;
                                    # negligible vs the 10000-unit daily budget.)
  refresh_days: 7                   # re-fetch videos PUBLISHED within this window (velocity tracking)
  cache_max_age_days: 1             # ALSO re-fetch any cached video whose snapshot is older than this
                                    # (chapter 6 commit 1: closes the "frozen cache for stable old videos" gap.
                                    # Combined logic: refetch if EITHER publish-age <= refresh_days OR
                                    # cache-age > cache_max_age_days.)

# Output
output:
  video_stats_file: video_stats   # filename without extension (extension added by format)
  format: parquet                  # parquet (default) or csv

# Curator — chapter 6: channel lifecycle management
curator:
  stale_threshold_days: 14         # flag channels with no new posts in this many days
                                    # (read by scripts/detect_stale.py)
  max_registry_size: 200           # hard cap on competitors.csv row count (active + inactive).
                                    # When promote_candidates.py would push the file over this,
                                    # it evicts the oldest inactive row (FIFO on deactivated_date,
                                    # excluding rows deactivated in this same run) to make room.
                                    # If no eligible inactive row exists, the promotion is skipped
                                    # for that pair.

# Attributes to fetch (comment out any you don't want)
# None here = fetch all. Remove items to narrow scope + save quota.
attributes:
  - views
  - likes
  - comments
  - duration
  - tags
  - description
  - thumbnail_url
  - category_id

# Competitor channels — moved to competitors.csv as of chapter 6 commit 1.
# When competitors.csv exists and has at least one active=true row, the
# collector reads from there and ignores this block. This empty fallback
# lets the collector still run if the CSV is ever missing (it'll just have
# no channels to process and exit cleanly).
#
# competitors.csv schema:
#   handle, channel_id, name, niche, tier, subscribers_at_addition,
#   added_date, active, deactivated_date, deactivated_reason
channels: []
