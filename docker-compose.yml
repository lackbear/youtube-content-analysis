# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Chapter 4 local stack
#
# Chapter 3 had one service (`collector`). Chapter 4 adds the orchestration
# layer as four new services:
#
#   postgres            — Airflow's metadata store (DAG runs, task states, …)
#   airflow-init        — one-shot: `db migrate` + admin user create, then exits
#   airflow-scheduler   — parses DAGs, schedules task instances, runs forever
#   airflow-webserver   — serves the UI at http://localhost:8080, runs forever
#
# The collector service is unchanged — Airflow will invoke it via a
# PythonOperator (commit 2) and later via DockerOperator (follow-up).
#
# The top-level `version:` key is intentionally absent: Compose v2 warns
# if it's present.
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared Airflow config (YAML anchor) ──────────────────────────────────────
# The three Airflow services share the same image, env vars, and volume
# mounts. Declaring them once with `&airflow-common` and re-using them via
# `<<: *airflow-common` keeps the file DRY — one place to change the image
# tag or Postgres connection string.
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.10
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # POC pattern: install runtime deps (collector + dbt) on container startup.
    # Adds ~1–2 min to first boot; subsequent starts are cached by pip.
    # Production replacement: build a custom Airflow image with these baked in
    # (FROM apache/airflow:... + RUN pip install ...). Documented as a
    # follow-up in chapter 5.
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas pyarrow google-api-python-client pyyaml python-dotenv dbt-core dbt-duckdb"
    # Make /opt/airflow importable so `from ingestion.Collectorv2 import run`
    # works from the DAG. Airflow only adds dags_folder and plugins_folder to
    # sys.path by default — the project root is not on it.
    PYTHONPATH: "/opt/airflow"
    # Absolute path to config.yaml so Collectorv2 loads it regardless of
    # whatever cwd the task subprocess inherits.
    COLLECTOR_CONFIG: "/opt/airflow/config.yaml"
    # dbt looks here for profiles.yml. Setting it in the env beats passing
    # --profiles-dir on every dbt invocation in the DAGs.
    DBT_PROFILES_DIR: "/opt/airflow/dbt_youtube"
  # YOUTUBE_API_KEY gets injected via .env (read by docker compose, propagated
  # to the Airflow containers so the collect task can hit the YouTube API).
  env_file:
    - .env
  volumes:
    # DAG code lives on the host — edits are picked up without rebuilding.
    - ./dags:/opt/airflow/dags
    # Single shared logs folder. Airflow's own task/scheduler logs land
    # under subfolders like ./logs/dag_id=.../; the collector's event +
    # quota JSONL files live at ./logs/YYYY-MM-DD.jsonl and
    # ./logs/quota/YYYY-MM-DD.jsonl. Mapping them to the same host folder
    # means the quota ledger is unified — `make run` and DAG-triggered
    # runs share one source of truth for today's usage.
    - ./logs:/opt/airflow/logs
    # Shared bronze layer: the collector writes here, the DAG (and later
    # dbt) reads from here. Same path as the collector service sees.
    - ./data:/opt/airflow/data
    # The collector is imported by the DAG's collect task as the package
    # `ingestion.Collectorv2`. Mounting the whole folder (including
    # __init__.py) makes the package discoverable; PYTHONPATH=/opt/airflow
    # then makes `from ingestion.Collectorv2 import run` resolve natively.
    - ./ingestion:/opt/airflow/ingestion:ro
    # Curator scripts (chapter 6) — detect_stale.py and (later) discover.py.
    # Both DAGs invoke them either via `from scripts.detect_stale import ...`
    # (PythonOperator variant) or `python /opt/airflow/scripts/detect_stale.py`
    # (BashOperator variant).
    - ./scripts:/opt/airflow/scripts:ro
    # dbt project — both DAGs (python_operator and bash_operator variants)
    # invoke dbt against this folder. Read-write because dbt writes
    # target/ (compiled SQL, manifest, run_results) and logs/ here on
    # every run. Same folder, same models, same warehouse — switching
    # which DAG is unpaused in the UI changes only how dbt is invoked.
    - ./dbt_youtube:/opt/airflow/dbt_youtube
    # Config + channel list, read-only.
    - ./config.yaml:/opt/airflow/config.yaml:ro
    - ./competitors.csv:/opt/airflow/competitors.csv:ro
  # UID handling: Airflow's official image expects UID 50000. Passing
  # group 0 (root) lets the container write to bind-mounted folders on
  # Linux without `sudo chown`. On Windows/WSL2 the UID is largely
  # cosmetic — the NTFS layer handles ownership translation.
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - pipeline


services:

  # ── Postgres — Airflow metadata store ────────────────────────────────────
  # Stateful service. Uses a NAMED volume (not a bind mount) because
  # Postgres's internal page files are sensitive to filesystem latency,
  # and bind-mounting them onto Windows is a well-known performance trap.
  # Named volumes live inside Docker's managed disk (the WSL2 VM) and run
  # at native speed.
  postgres:
    image: postgres:14-alpine
    container_name: yt-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Other services gate on `condition: service_healthy` — the scheduler
      # and webserver wait until Postgres actually accepts connections,
      # not just until the process has started.
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipeline


  # ── Airflow init — runs once, then exits ─────────────────────────────────
  # Two jobs:
  #   1. `airflow db migrate` — creates/updates Airflow's schema in Postgres.
  #      Safe to run repeatedly; idempotent.
  #   2. `airflow users create` — creates an admin user (admin/admin) if it
  #      doesn't already exist. The `|| true` swallows the "already exists"
  #      error on subsequent runs so `docker compose up` stays green.
  #
  # Scheduler + webserver depend on this succeeding — see their
  # `condition: service_completed_successfully` gates below.
  airflow-init:
    <<: *airflow-common
    container_name: yt-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --email admin@example.com \
          --role Admin || true
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy


  # ── Airflow scheduler ────────────────────────────────────────────────────
  # The brain. Continuously parses DAG files in /opt/airflow/dags, decides
  # which task instances should run (per their schedule + dependency state),
  # and hands them to the executor. With LocalExecutor, the executor is
  # built into the scheduler process — tasks run as subprocesses here.
  airflow-scheduler:
    <<: *airflow-common
    container_name: yt-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5


  # ── Airflow webserver ────────────────────────────────────────────────────
  # The UI. Login at http://localhost:8080 with admin/admin (POC creds —
  # rotate before anything that faces the internet). Serves DAG graphs,
  # task logs, run history, manual triggers.
  airflow-webserver:
    <<: *airflow-common
    container_name: yt-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5


  # ── Collector (unchanged from Chapter 3) ─────────────────────────────────
  collector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: youtube-collector:0.3.0
    container_name: yt-collector
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
      - ./competitors.csv:/app/competitors.csv:ro
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - pipeline


# ── Networks ────────────────────────────────────────────────────────────────
# One user-defined bridge network. Every service on it can reach every
# other by service name (the scheduler reaches Postgres at `postgres:5432`,
# not by IP). Docker's built-in DNS handles the resolution.
networks:
  pipeline:
    driver: bridge


# ── Volumes (named) ─────────────────────────────────────────────────────────
# `postgres_data` survives `docker compose down`. To wipe it (and lose
# all DAG run history), add `--volumes`: `docker compose down --volumes`.
volumes:
  postgres_data:
